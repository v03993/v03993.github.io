<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .contact-card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .contact-header {
            background: #1a2a3a;
            padding: 2rem 2rem 1.5rem;
            color: white;
        }

        .contact-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .contact-header p {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .contact-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #1e2a36;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            background: #fefefe;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.2);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: #1a2a3a;
            color: white;
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.05s;
            letter-spacing: 0.3px;
        }

        button:hover {
            background: #0f1e2a;
        }

        button:active {
            transform: scale(0.98);
        }

        .note {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #5b6e8c;
            border-top: 1px solid #edf2f7;
            padding-top: 1.2rem;
        }

        @media (max-width: 480px) {
            .contact-card {
                border-radius: 1.5rem;
            }
            .contact-form {
                padding: 1.5rem;
            }
            .contact-header {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="contact-card">
        <div class="contact-header">
            <h1>Contact Us</h1>
            <p>Send us a message — we’ll reply within 24 hours.</p>
        </div>
        <div class="contact-form">
            <!-- 
              ⚠️ IMPORTANT: Replace the email address in the "action" URL below with YOUR email.
              Example: https://formsubmit.co/yourname@example.com
            -->
            <form action="https://formsubmit.co/5367422d25a07cafc7283512354244b0" method="POST">
                
                <!-- ========================================== -->
                <!-- HONEYPOT FIELD (invisible anti-bot trap)   -->
                <!-- ========================================== -->
                <input type="text" name="_honeypot" style="display:none;" tabindex="-1" autocomplete="off">

                <!-- OPTIONAL but recommended: disable default FormSubmit captcha -->
                <input type="hidden" name="_captcha" value="false">

                <!-- Redirect after success (you can change this later) -->


                <div class="form-group">
                    <label for="name">Full name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button type="submit">Send message →</button>
                <div class="note">
                    ✉️ Your message is sent directly to our inbox. No spam, no third parties.
                </div>
            </form>
        </div>
    </div>
</body>
</html>
